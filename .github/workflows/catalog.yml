name: catalog

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: catalog-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-catalog:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out exact source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Install locked uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: 0.11.21
          enable-cache: false

      - name: Install exact Python and locked dependencies
        run: |
          uv python install 3.13.14
          uv sync --frozen

      - name: Run complete clean-checkout catalog verification
        run: make verify

      - name: Archive catalog build output
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: catalog-build-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 14
